name: 功能建议
description: 分享你希望 CodePulse 支持的新能力
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 使用场景
      description: 你遇到了什么问题，希望 CodePulse 如何帮助？
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 描述理想的行为或交互。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 其他方案
      description: 是否考虑过替代做法？
