name: Bug 反馈
description: 报告可复现的问题，帮助 CodePulse 变得更稳定
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: 感谢反馈。提交前请确认你使用的是最新版本。
  - type: input
    id: version
    attributes:
      label: CodePulse 版本
      placeholder: 例如 v0.1.2
    validations:
      required: true
  - type: input
    id: windows
    attributes:
      label: Windows 版本
      placeholder: 例如 Windows 11 24H2
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 请描述实际表现与预期表现。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 启动……
        2. 点击……
        3. 出现……
    validations:
      required: true
  - type: textarea
    id: screenshot
    attributes:
      label: 截图或补充信息
      description: 请先移除截图中的敏感信息。
